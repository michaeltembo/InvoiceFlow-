<script>

console.log("SCRIPT LOADED");

async function saveCompanySettings(){



const token = localStorage.getItem("token");

console.log("CLICK WORKING");

const name = document.getElementById("companyName").value.trim();
const registration_number = document.getElementById("companyReg").value.trim();
const email = document.getElementById("companyEmail").value.trim();
const phone = document.getElementById("companyPhone").value.trim();
const address = document.getElementById("companyAddress").value.trim();
const country = document.getElementById("companyCountry").value.trim();

/* TRANSFER DETAILS */

const bank_name = document.getElementById("bank_name").value;
const account_name = document.getElementById("account_name").value;
const account_number = document.getElementById("account_number").value;
const branch = document.getElementById("branch").value;
const swift = document.getElementById("swift").value;
const mobile_money = document.getElementById("mobile_money").value;

const invoice_footer = document.getElementById("invoice_footer")?.value || "";

try{

const res = await fetch("/company/settings",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer " + token
},

body: JSON.stringify({
  company_name: name,
  registration_number,
  email,
  phone,
  address,
  country,
  bank_name,
  account_name,
  account_number,
  branch,
  swift,
  mobile_money,
  invoice_footer
})

});

if(!res.ok){
throw new Error("Request failed");
}

const data = await res.json();

alert("Company settings saved successfully");

}catch(err){

console.error(err);
alert("Failed to save settings");

}

}



async function loadCompanySettings(){

const token = localStorage.getItem("token")

const res = await fetch("/company-settings",{
headers:{
Authorization:"Bearer "+token
}
})

const company = await res.json()

document.getElementById("bank_name").value = company.bank_name || ""
document.getElementById("account_name").value = company.account_name || ""
document.getElementById("account_number").value = company.account_number || ""
document.getElementById("branch").value = company.branch || ""
document.getElementById("swift").value = company.swift || ""
document.getElementById("mobile_money").value = company.mobile_money || ""

}

loadCompanySettings();

</script>
