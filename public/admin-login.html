
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>InvoiceFlow | Admin Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* 🌐 Animated SaaS background */
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:linear-gradient(270deg,#4f46e5,#06b6d4,#10b981,#f59e0b);
  background-size:800% 800%;
  animation:gradientMove 16s ease infinite;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* 🧊 Glass container */
.container{
  width:360px;
  padding:45px;
  background:rgba(255,255,255,0.95);
  border-radius:16px;
  box-shadow:0 25px 60px rgba(0,0,0,0.2);
  backdrop-filter:blur(8px);
  text-align:center;
}

/* 🏷 Brand */
.brand{
  font-size:22px;
  font-weight:700;
  color:#4f46e5;
  margin-bottom:5px;
}

.subtitle{
  font-size:13px;
  color:#6b7280;
  margin-bottom:25px;
}

/* 🔐 Title */
h2{
  margin-bottom:25px;
  font-weight:600;
  color:#111827;
}

/* ✏️ Inputs */
input{
  width:100%;
  padding:12px;
  margin-bottom:14px;
  border-radius:8px;
  border:1px solid #e5e7eb;
  font-size:14px;
  transition:0.2s;
}

input:focus{
  outline:none;
  border-color:#4f46e5;
  box-shadow:0 0 0 3px rgba(79,70,229,0.15);
}

/* 🔘 Button */
button{
  width:100%;
  padding:13px;
  border:none;
  border-radius:8px;
  background:linear-gradient(135deg,#4f46e5,#6366f1);
  color:white;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:0.25s;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 25px rgba(79,70,229,0.35);
}

button:disabled{
  opacity:0.7;
  cursor:not-allowed;
}

/* 🔗 Footer */
.footer{
  margin-top:20px;
  font-size:13px;
  color:#6b7280;
}

.footer a{
  color:#4f46e5;
  text-decoration:none;
  font-weight:500;
}

.footer a:hover{
  text-decoration:underline;
}

</style>
</head>

<body>

<div class="container">

  <div class="brand">InvoiceFlow</div>
  <div class="subtitle">Admin Control Panel</div>

  <h2>Admin Sign In</h2>

  <input id="email" placeholder="Admin Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login Securely</button>

  <div class="footer">
    <a href="/login.html">User Login</a>
  </div>

</div>

<script>
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (!email || !password) {
    alert("Enter admin email and password");
    return;
  }

  const btn = document.querySelector("button");
  btn.innerText = "Logging in...";
  btn.disabled = true;

  const res = await fetch("/admin/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (res.ok) {
    localStorage.setItem("token", data.token);
    window.location.href = "/admin.html";
  } else {
    btn.innerText = "Login Securely";
    btn.disabled = false;
    alert(data.error || "Login failed");
  }
}
</script>

</body>
</html>
