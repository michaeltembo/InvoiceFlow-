<!DOCTYPE html>
<html>
<head>

<title>Tax Settings</title>

<style>

/* Page background (clean SaaS dashboard) */

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
background:#f8fafc;
}

/* Page layout */

.page{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:40px;
}

/* Card container */

.card{
background:white;
padding:40px;
border-radius:16px;
width:420px;
box-shadow:0 25px 60px rgba(0,0,0,0.12);
transition:all 0.3s ease;
}

.card:hover{
transform:translateY(-4px);
box-shadow:0 30px 70px rgba(0,0,0,0.16);
}

/* Title */

h2{
margin-bottom:25px;
color:#111827;
font-weight:600;
}

/* Inputs */

.card input,
.card select{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #e5e7eb;
font-size:14px;
background:white;
transition:all 0.2s ease;
}

.card input:focus,
.card select:focus{
outline:none;
border-color:#6366f1;
box-shadow:0 0 0 3px rgba(99,102,241,0.15);
}

/* Button */

.card button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#6366f1;
color:white;
font-weight:600;
cursor:pointer;
transition:all 0.25s ease;
}

.card button:hover{
background:#4f46e5;
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(79,70,229,0.25);
}

/* Success message */

#taxMessage{
margin-top:15px;
font-size:14px;
color:#16a34a;
}



/* =============================
   DARK MODE - TAX & CURRENCY
============================= */

body.dark {
  background: #0f172a;
  color: #e5e7eb;
}

/* CARD */
body.dark .card {
  background: #1e293b;
  border: 1px solid #334155;
  padding: 20px;
  border-radius: 12px;
}

/* TITLE */
body.dark .card h2 {
  color: #f9fafb;
}

/* SELECT */
body.dark #currency {
  background: #0f172a;
  color: #e5e7eb;
  border: 1px solid #334155;
  padding: 10px;
  border-radius: 8px;
}

/* INPUTS */
body.dark #taxRate,
body.dark #taxName {
  background: #0f172a;
  color: #e5e7eb;
  border: 1px solid #334155;
  padding: 10px;
  border-radius: 8px;
}

/* PLACEHOLDER */
body.dark input::placeholder {
  color: #64748b;
}

/* BUTTON */
body.dark .card button {
  background: #4f46e5;
  color: #ffffff;
  border: none;
  padding: 10px 14px;
  border-radius: 8px;
}

body.dark .card button:hover {
  opacity: 0.9;
}

/* MESSAGE */
body.dark #taxMessage {
  color: #94a3b8;
}

</style>
</head>

<body>

<div class="page">

<div class="card">

<h2>Tax & Currency</h2>

<select id="currency">
<option value="USD">USD</option>
<option value="EUR">EUR</option>
<option value="GBP">GBP</option>
<option value="ZMW">ZMW</option>
</select>

<input id="taxRate" placeholder="Default Tax Rate (%)">

<input id="taxName" placeholder="Tax Name (VAT / GST)">

<button onclick="saveTaxSettings()">Save Settings</button>

<p id="taxMessage"></p>

</div>

</div>
<script>

async function saveTaxSettings(){

const token = localStorage.getItem("token");

const currency = document.getElementById("currency").value;
const taxRate = document.getElementById("taxRate").value;
const taxName = document.getElementById("taxName").value;

localStorage.setItem("currency", currency);   // ⭐ SAVE CURRENCY LOCALLY

try{

const res = await fetch("/settings/tax",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer " + token
},
body: JSON.stringify({
currency,
taxRate,
taxName
})
});

if(!res.ok){
throw new Error("Save failed");
}

document.getElementById("taxMessage").innerText =
"Settings saved successfully";

}catch(err){

console.error(err);

document.getElementById("taxMessage").innerText =
"Failed to save settings";

}

}


// =============================
// LOAD SAVED THEME
// =============================
document.addEventListener("DOMContentLoaded", () => {
const savedTheme = localStorage.getItem("theme");

if (savedTheme === "dark") {
document.body.classList.add("dark");
}

// SYSTEM DARK MODE (FIXED)
const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;

if (!savedTheme && prefersDark) {
document.body.classList.add("dark");
}
});


// =============================
// TOGGLE THEME
// =============================
function toggleTheme() {
document.body.classList.toggle("dark");

if (document.body.classList.contains("dark")) {
localStorage.setItem("theme", "dark");
} else {
localStorage.setItem("theme", "light");
}
}


</script>


</body>
</html>
