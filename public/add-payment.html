<!DOCTYPE html>
<html>

<head>

<title>Add Payment • InvoiceFlow</title>

<style>

body{
font-family:Inter,system-ui;
background:#f4f6f9;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 2px 12px rgba(0,0,0,0.05);
}

h2{
margin-top:0;
}

input,select{
width:100%;
padding:10px;
margin-bottom:12px;
border:1px solid #ddd;
border-radius:6px;
}

button{
background:#2563eb;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
font-weight:600;
}

button:hover{
background:#1d4ed8;
}

</style>

</head>

<body>

<div class="container">

<h2>Add Payment</h2>

<form id="paymentForm">

<input type="date" id="date" required>

<select id="method">
<option>MTN MoMo</option>
<option>Airtel Money</option>
<option>Zamtel Kwacha</option>
<option>Bank Transfer</option>
</select>

<input type="text" id="description" placeholder="Description">

<input type="text" id="reference" placeholder="Reference">

<input type="number" id="amount" placeholder="Amount">

<button type="submit">
Save Payment
</button>

</form>

</div>

<script>

document
.getElementById("paymentForm")
.addEventListener("submit",savePayment)

async function savePayment(e){

e.preventDefault()

const payment={

date:document.getElementById("date").value,
method:document.getElementById("method").value,
description:document.getElementById("description").value,
reference:document.getElementById("reference").value,
amount:Number(document.getElementById("amount").value)

}

await fetch("/payments",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(payment)

})

window.location="payments.html"

}

</script>

</body>

</html>
