<!DOCTYPE html>
<html>

<head>

<title>View Payment • InvoiceFlow</title>

<style>

*{
box-sizing:border-box;
}

body{
font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto;
background:#f4f6f9;
margin:0;
padding:40px 20px;
color:#111827;
}

/* CONTAINER */

.container{
max-width:720px;
margin:auto;
background:white;
padding:36px;
border-radius:14px;
border:1px solid #e5e7eb;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

/* HEADER */

h2{
margin:0 0 25px 0;
font-size:22px;
font-weight:600;
}

/* ROWS */

.row{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 0;
border-bottom:1px solid #f1f5f9;
}

.row:last-child{
border-bottom:none;
}

.label{
font-size:13px;
color:#6b7280;
}

.value{
font-size:15px;
font-weight:600;
}

/* METHOD BADGE */

#method{
background:#eef2ff;
color:#4338ca;
padding:4px 10px;
border-radius:6px;
font-size:13px;
}

/* REFERENCE */

#reference{
font-family:monospace;
color:#374151;
}

/* AMOUNT */

#amount{
font-size:20px;
font-weight:700;
color:#16a34a;
}

/* QR SECTION */

.qr-section{
margin-top:35px;
padding:22px;
border:1px solid #e5e7eb;
border-radius:10px;
background:#fafafa;
text-align:center;
}

.qr-section h3{
margin-top:0;
font-size:16px;
}

.qr-section p{
font-size:13px;
color:#6b7280;
}

.qr-section img{
margin-top:12px;
width:150px;
height:150px;
}

/* BACK BUTTON */

.back{
display:inline-block;
margin-top:30px;
background:#111827;
color:white;
padding:10px 16px;
border-radius:8px;
font-size:14px;
text-decoration:none;
}

.back:hover{
background:#1f2937;
}

/* MOBILE */

@media(max-width:600px){

.row{
flex-direction:column;
align-items:flex-start;
gap:5px;
}

}

</style>

</head>

<body>

<div class="container">

<h2>Payment Details</h2>

<div class="row">
<div class="label">Date</div>
<div class="value" id="date"></div>
</div>

<div class="row">
<div class="label">Method</div>
<div class="value" id="method"></div>
</div>

<div class="row">
<div class="label">Description</div>
<div class="value" id="description"></div>
</div>

<div class="row">
<div class="label">Reference</div>
<div class="value" id="reference"></div>
</div>

<div class="row">
<div class="label">Amount</div>
<div class="value" id="amount"></div>
</div>


<div class="qr-section">

<h3>Payment Verification</h3>

<p>Scan the QR code to verify this payment receipt.</p>

<img id="qrCode">

</div>

<a href="payments.html" class="back">
Back to Payments
</a>

</div>

<script>

const currency = localStorage.getItem("currency") || "ZMW";

function formatMoney(amount){
return new Intl.NumberFormat("en-US",{
style:"currency",
currency:currency
}).format(amount);
}

const params = new URLSearchParams(window.location.search)
const id = params.get("id")

loadPayment()

async function loadPayment(){

const res = await fetch("/payments")
const data = await res.json()

const payment = data.find(p => p.id == id)

if(!payment) return

const date = new Date(payment.date).toLocaleDateString()

document.getElementById("date").innerText = date
document.getElementById("method").innerText = payment.method
document.getElementById("description").innerText = payment.description || "-"
document.getElementById("reference").innerText = payment.reference || "-"
document.getElementById("amount").innerText = formatMoney(payment.amount)

const receiptURL =
`${window.location.origin}/receipt/${payment.reference}`

document.getElementById("qrCode").src =
`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${receiptURL}`

}

</script>

</body>

</html>
