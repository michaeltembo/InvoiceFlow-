<!DOCTYPE html>
<html>
<head>
<title>Invoice Settings</title>

<style>

/* Clean SaaS background */

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
background:#f8fafc;
}

/* Page layout */

.page{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:40px;
}

/* Card */

.card{
background:white;
padding:40px;
border-radius:16px;
width:420px;
box-shadow:0 25px 60px rgba(0,0,0,0.12);
transition:all 0.3s ease;
}

.card:hover{
transform:translateY(-4px);
box-shadow:0 30px 70px rgba(0,0,0,0.16);
}

/* Title */

h2{
margin-bottom:25px;
color:#111827;
font-weight:600;
}

/* Inputs */

.card input{
width:100%;
padding:12px;
margin-bottom:14px;
border-radius:8px;
border:1px solid #e5e7eb;
font-size:14px;
transition:all 0.2s ease;
}

.card input:focus{
outline:none;
border-color:#6366f1;
box-shadow:0 0 0 3px rgba(99,102,241,0.15);
}

/* Button */

.card button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#6366f1;
color:white;
font-weight:600;
cursor:pointer;
transition:all 0.25s ease;
}

.card button:hover{
background:#4f46e5;
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(79,70,229,0.25);
}

/* Message */

#invoiceMsg{
margin-top:15px;
font-size:14px;
color:#16a34a;
}

  padding: 20px;
}


.card {
  background: #ffffff;
  padding: 20px;
  border-radius: 14px;
  border: 1px solid #e5e7eb;
  max-width: 500px;
}

/* DARK MODE */
body.dark .card {
  background: #020617;
  border: 1px solid #1e293b;
}

  margin-bottom: 16px;
  color: #0f172a;
}

body.dark .card h2 {
  color: #ffffff;
}

  width: 100%;
  height: 42px;
  padding: 0 12px;
  margin-bottom: 12px;

  border-radius: 8px;
  border: 1px solid #e5e7eb;

  background: #ffffff;
  color: #0f172a;

  font-size: 14px;
}

/* PLACEHOLDER */
.card input::placeholder {
  color: #94a3b8;
}

/* FOCUS */
.card input:focus {
  outline: none;
  border-color: #6366f1;
}

/* DARK MODE */
body.dark .card input {
  background: #1e293b !important;
  color: #f1f5f9 !important;
  border: 1px solid #334155 !important;
}

body.dark .card input::placeholder {
  color: #64748b;
}


.card button {
  width: 100%;
  height: 42px;

  background: #6366f1;
  color: #ffffff;

  border: none;
  border-radius: 8px;
  cursor: pointer;

  font-size: 14px;
  font-weight: 500;
}

.card button:hover {
  background: #4f46e5;
}

#invoiceMsg {
  margin-top: 10px;
  font-size: 13px;
  color: #16a34a;
}

#invoiceMsg.error {
  color: #ef4444;
}





/* =============================
   DARK MODE - INVOICE PREFERENCES
============================= */

body.dark {
  background: #0f172a;
  color: #e5e7eb;
}

/* CARD */
body.dark .card {
  background: #1e293b;
  border: 1px solid #334155;
  padding: 20px;
  border-radius: 12px;
}

/* TITLE */
body.dark .card h2 {
  color: #f9fafb;
}

/* INPUTS */

body.dark #startNumber,
body.dark #paymentTerms,

  color: #


</style>
</head>

<body>

<div class="page">

<div class="card">

<h2>Invoice Preferences</h2>

<input id="invoicePrefix" placeholder="Invoice Prefix (INV-)">

<input id="startNumber" placeholder="Starting Invoice Number">

<input id="paymentTerms" placeholder="Default Payment Terms (Days)">

<input id="invoiceFooter" placeholder="Invoice Footer Message">

<button onclick="saveInvoicePreferences()">Save Preferences</button>

<p id="invoiceMsg"></p>

</div>

</div>


<script>

async function saveInvoicePreferences(){

const token = localStorage.getItem("token");

const prefix = document.getElementById("invoicePrefix").value;
const startNumber = document.getElementById("startNumber").value;
const paymentTerms = document.getElementById("paymentTerms").value;
const footer = document.getElementById("invoiceFooter").value;

try{

const res = await fetch("/invoice/preferences",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer " + token
},
body: JSON.stringify({
prefix,
startNumber,
paymentTerms,
footer
})
});

if(!res.ok){
throw new Error("Request failed");
}

document.getElementById("invoiceMsg").textContent =
"Preferences saved successfully";

}catch(err){

console.error(err);

document.getElementById("invoiceMsg").textContent =
"Failed to save preferences";

}

}


// =============================
// LOAD SAVED THEME
// =============================
document.addEventListener("DOMContentLoaded", () => {
const savedTheme = localStorage.getItem("theme");

if (savedTheme === "dark") {
document.body.classList.add("dark");
}

// SYSTEM DARK MODE (FIXED)
const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;

if (!savedTheme && prefersDark) {
document.body.classList.add("dark");
}
});


// =============================
// TOGGLE THEME
// =============================
function toggleTheme() {
document.body.classList.toggle("dark");

if (document.body.classList.contains("dark")) {
localStorage.setItem("theme", "dark");
} else {
localStorage.setItem("theme", "light");
}
}




</script>

</body>
</html>
