<!DOCTYPE html>
<html>

<head>
<title>Two-Factor Authentication</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
background:#f4f6fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:40px;
width:380px;
border-radius:14px;
box-shadow:0 15px 40px rgba(0,0,0,0.08);
text-align:center;
}

h2{
margin-bottom:25px;
color:#111827;
font-weight:600;
letter-spacing:0.3px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#6366f1;
color:white;
font-size:14px;
font-weight:500;
cursor:pointer;
transition:all 0.2s ease;
}

button:hover{
background:#4f46e5;
transform:translateY(-1px);
box-shadow:0 6px 16px rgba(99,102,241,0.25);
}

#qr{
margin-top:25px;
max-width:200px;
}

</style>

</head>

<body>

<div class="card">

<h2>Two-Factor Authentication</h2>

<button onclick="enable2FA()">Generate QR Code</button>

<br><br>

<img id="qr">

</div>

<script>

async function enable2FA(){

const token = localStorage.getItem("token");

const res = await fetch("/generate-2fa",{
headers:{
"Authorization":"Bearer " + token
}
});

const data = await res.json();

document.getElementById("qr").src = data.qr;

}

</script>

</body>

</html>
