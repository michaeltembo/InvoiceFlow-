<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>InvoiceFlow | Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

/* Dynamic SaaS background */

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
background:linear-gradient(270deg,#4f46e5,#06b6d4,#10b981,#f59e0b);
background-size:800% 800%;
animation:gradientMove 16s ease infinite;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* Background animation */

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Container */

.container{
background:rgba(255,255,255,0.95);
padding:45px;
width:360px;
border-radius:14px;
box-shadow:0 25px 60px rgba(0,0,0,0.2);
text-align:center;
backdrop-filter:blur(6px);
}

/* Top bar */

.top-bar{
display:flex;
justify-content:flex-end;
margin-bottom:15px;
}

/* Language selector */

#languageSelect{
padding:6px 10px;
border-radius:6px;
border:1px solid #e5e7eb;
font-size:13px;
cursor:pointer;
background:white;
}

/* Title */

h2{
margin-top:10px;
margin-bottom:25px;
font-weight:600;
color:#111827;
}

/* Inputs */

.container input{
width:100%;
padding:12px;
margin-bottom:14px;
border-radius:8px;
border:1px solid #e5e7eb;
font-size:14px;
transition:all 0.2s ease;
}

/* Input focus */

.container input:focus{
outline:none;
border-color:#4f46e5;
box-shadow:0 0 0 3px rgba(79,70,229,0.15);
}

/* Login button */

#loginBtn{
width:100%;
padding:13px;
border:none;
border-radius:8px;
background:linear-gradient(135deg,#4f46e5,#6366f1);
color:white;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:all 0.25s ease;
}

/* Button hover */

#loginBtn:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(79,70,229,0.35);
}

/* Links */

.links{
margin-top:18px;
font-size:14px;
color:#6b7280;
}

/* Link */

.links a{
color:#4f46e5;
text-decoration:none;
font-weight:500;
margin-left:5px;
}

.links a:hover{
text-decoration:underline;
}

</style>


</head>
<body>

<div class="container">

  <div class="top-bar">
    <select id="languageSelect" onchange="changeLanguage()">
      <option value="en">English</option>
      <option value="fr">Français</option>
      <option value="es">Español</option>
    </select>
  </div>

  <h2 id="loginTitle">Sign In to Your Account</h2>

<input id="email" type="email" placeholder="Business Email Address">

<input id="password" type="password" placeholder="Password">

<label style="font-size:13px;">
<input type="checkbox" onclick="togglePassword()"> Show Password
</label>

<button id="loginBtn" onclick="login()">Login Securely</button>

  <div class="links">
    <span id="noAccountText">Don't have an account?</span>
    <a href="/register.html" id="createAccountText">Create Account</a>
    <a href="/forgot-password.html">Forgot Password?</a>

  </div>

</div>

<script>

const translations = {
  en: {
    loginTitle: "Sign In to Your Account",
    emailPlaceholder: "Business Email Address",
    passwordPlaceholder: "Password",
    loginBtn: "Login Securely",
    noAccountText: "Don't have an account?",
    createAccountText: "Create Account"
  },
  fr: {
    loginTitle: "Connectez-vous à votre compte",
    emailPlaceholder: "Adresse e-mail professionnelle",
    passwordPlaceholder: "Mot de passe",
    loginBtn: "Connexion sécurisée",
    noAccountText: "Vous n'avez pas de compte ?",
    createAccountText: "Créer un compte"
  },
  es: {
    loginTitle: "Inicia sesión en tu cuenta",
    emailPlaceholder: "Correo electrónico empresarial",
    passwordPlaceholder: "Contraseña",
    loginBtn: "Iniciar sesión",
    noAccountText: "¿No tienes una cuenta?",
    createAccountText: "Crear cuenta"
  }
};

function changeLanguage() {
  const lang = document.getElementById("languageSelect").value;
  localStorage.setItem("language", lang);
  applyLanguage(lang);
}

function applyLanguage(lang) {
  const t = translations[lang];
  document.getElementById("loginTitle").innerText = t.loginTitle;
  document.getElementById("email").placeholder = t.emailPlaceholder;
  document.getElementById("password").placeholder = t.passwordPlaceholder;
  document.getElementById("loginBtn").innerText = t.loginBtn;
  document.getElementById("noAccountText").innerText = t.noAccountText;
  document.getElementById("createAccountText").innerText = t.createAccountText;
}

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (!email || !password) {
    alert("Please enter email and password");
    return;
  }

  const res = await fetch("/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (res.ok) {
    localStorage.setItem("token", data.token);

    // ✅ Decode token
    const payload = JSON.parse(atob(data.token.split(".")[1]));

    // ✅ Redirect based on role
    if (payload.is_super_admin) {
      window.location.href = "/admin.html";   // 👑 admin
    } else {
      window.location.href = "/dashboard.html"; // 👤 normal user
    }

  } else {

    if (data.error === "Use admin login") {
      window.location.href = "/admin-login.html";
      return;
    }

    alert(data.error || "Login failed");
  }
}


</script>
<script>

function togglePassword(){

const password = document.getElementById("password");

if(password.type === "password"){
password.type = "text";
}else{
password.type = "password";
}

}

</script>


</body>
</html>
