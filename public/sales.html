<style>

/* PAGE */

body{

background:#f4f6f9;

/* HEADER */

.page-header{
display:flex;

text-align:left;

color:#92400e;

font-size:13px;
}

align-items:flex-start;
gap:10px;
}

}

.stats-grid{

grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:30px;
}

/* CARD DESIGN */

.card,

padding:22px;
border-radius:12px;
box-shadow:0 4px 14px rgba(0,0,0,0.06);

}

transform:translateY(-3px);
box-shadow:0 8px 22px rgba(0,0,0,0.08);
}

/* TEXT */

.card span,

color:#6b7280;

}

.card h3,

margin-top:8px;

/* STATUS COLORS */

.total-card{

}

.total-card h3{
color:#2563eb;
}

.paid-card{

}

.paid-card h3{
color:#16a34a;
}

.outstanding-card{
border-left:4px solid #f59e0b;
}

.outstanding-card h3{
color:#f59e0b;
}

.overdue-card{
border-left:4px solid #dc2626;
}

.overdue-card h3{
color:#dc2626;
}


.back-btn{
position:fixed;
top:20px;
right:20px;
background:#f3f4f6;
border:none;
padding:8px 14px;
border-radius:8px;
font-size:13px;
font-weight:600;
cursor:pointer;
color:#374151;

background:#e5e7eb;

#clientSpotlightImage{

  background-position: center;

</head>

<body>
<button class="back-btn" onclick="goBack()">← Back</button>
<div class="container">

<header class="elite-header">

  <div class="header-left">
    <h1>Sales Invoices</h1>
    <span class="subtitle">Track revenue & payments</span>
  </div>

  <div class="header-right">

    <input
      type="text"
      placeholder="Search invoices..."
      class="header-search"
    />

    <button class="create-btn" onclick="createInvoice()">
      + New Invoice
    </button>

  </div>

</header>


<!-- SUMMARY CARDS -->

<section class="summary">

<div class="card total-card">
<span>Total Invoices</span>
<h3 id="totalInvoices">0</h3>
</div>

<div class="card paid-card">
<span>Paid</span>
<h3 id="paidTotal">0</h3>
</div>

<div class="card outstanding-card">
<span>Outstanding</span>
<h3 id="pendingTotal">0</h3>
</div>

<div class="card overdue-card">
<span>Overdue</span>
<h3 id="overdueTotal">0</h3>
</div>

</section>

<!-- TABLE -->

<div class="table-wrapper">

<table>

<thead>

<tr>
<th>Invoice</th>
<th>Client</th>
<th>Date</th>
<th>Status</th>
<th>Total</th>
</tr>

</thead>

<tbody id="invoiceTable">

<tr>
<td colspan="6">Loading invoices...</td>
</tr>

</tbody>

</table>

</div>


<script>


const currency = localStorage.getItem("currency") || "ZMW";

const rates = {
  USD:1,
  EUR:0.92,
  GBP:0.79,
  ZMW:27
};

function formatMoney(amount){
  return new Intl.NumberFormat("en-US",{
    style:"currency",
    currency: currency
  }).format(amount);
}

lucide.createIcons()

document.addEventListener("DOMContentLoaded",loadInvoices)

async function loadInvoices(){

  try {

    const token = localStorage.getItem("token");

    const [invRes, clientRes] = await Promise.all([
      fetch("/invoices", {
        headers: { Authorization: "Bearer " + token }
      }),
      fetch("/clients", {
        headers: { Authorization: "Bearer " + token }
      })
    ]);

    const invData = await invRes.json();
    const clientData = await clientRes.json();

    const invoices = Array.isArray(invData)
      ? invData
      : invData.data || [];

    const clients = Array.isArray(clientData)
      ? clientData
      : clientData.data || [];

    // ✅ NOW IT WORKS
    renderInvoices(invoices, clients);

  } catch(err){
    console.error(err);
  }

}

/* RENDER INVOICES */

function renderInvoices(invoices, clients){

  const table = document.getElementById("invoiceTable");

  table.innerHTML = "";

const clientMap = {};

(clients || []).forEach(c => {


  clientMap[c.name] = c;
});

  let totalInvoices = invoices.length;
  let paidTotal = 0;
  let pendingTotal = 0;
  let overdueTotal = 0;

  // ✅ HANDLE EMPTY STATE CORRECTLY
  if (!invoices.length){
    table.innerHTML = "<tr><td colspan='5'>No invoices yet</td></tr>";
    return;
  }

  // ✅ LOOP OUTSIDE THE IF
  invoices.forEach(inv => {

    const row = document.createElement("tr");

const client = clientMap[inv.client_name];

const hasAvatar =
  client &&
  client.avatar &&
  client.avatar !== "null" &&
  client.avatar !== "";

const avatar = hasAvatar
  ? `/uploads/${client.avatar}`
  : `https://ui-avatars.com/api/?name=${encodeURIComponent(inv.client_name || "Client")}&background=6366f1&color=fff`;


    row.innerHTML = `

    <td>
      <div class="invoice-cell">
        <div class="invoice-icon">📄</div>
        <div>
          <strong>INV-${inv.id}</strong><br>
          <small>#${inv.id}</small>
        </div>
      </div>
    </td>

    <td>
      <div class="client-cell">
        <img src="${avatar}" class="client-avatar">
        <span>${inv.client_name || "-"}</span>
      </div>
    </td>

    <td>${formatDate(inv.created_at)}</td>

    <td>
      <span class="status ${inv.status}">
        ${inv.status}
      </span>

      ${
        inv.status === "paid"
          ? `
          <div class="paid-meta">
            <img src="${avatar}" class="paid-avatar">
            <small>${formatDate(inv.paid_at || inv.created_at)}</small>
          </div>
          `
          : ""
      }
    </td>

    <td>
      <div class="total-cell">
        <div class="invoice-badge">💰</div>
        <strong>${formatCurrency(inv.total)}</strong>
      </div>
    </td>

    `;

    table.appendChild(row);

    // ✅ TOTALS
    if (inv.status === "paid") paidTotal += Number(inv.total);
    if (inv.status === "pending") pendingTotal += Number(inv.total);
    if (inv.status === "overdue") overdueTotal += Number(inv.total);

  });

  // ✅ UPDATE KPI CARDS
  document.getElementById("totalInvoices").innerText = totalInvoices;
  document.getElementById("paidTotal").innerText = formatCurrency(paidTotal);
  document.getElementById("pendingTotal").innerText = formatCurrency(pendingTotal);
  document.getElementById("overdueTotal").innerText = formatCurrency(overdueTotal);
}


/* FORMAT FUNCTIONS */

function formatCurrency(value){
return formatMoney(value);
}


function formatDate(date){

if(!date) return "-"

return new Date(date).toLocaleDateString()

}


/* CREATE INVOICE */

function createInvoice(){

window.location="create-invoice.html"

}

</script>

<script>

function goBack(){
window.history.back()
}








// =============================
// LOAD SAVED THEME
// =============================
document.addEventListener("DOMContentLoaded", () => {
  const savedTheme = localStorage.getItem("theme");

  if (savedTheme === "dark") {
    document.body.classList.add("dark");
  }

  // SYSTEM DARK MODE (FIXED)
  const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;

  if (!savedTheme && prefersDark) {
    document.body.classList.add("dark");
  }
});


// =============================
// TOGGLE THEME
// =============================
function toggleTheme() {
  document.body.classList.toggle("dark");

  if (document.body.classList.contains("dark")) {
    localStorage.setItem("theme", "dark");
  } else {
    localStorage.setItem("theme", "light");
  }
}
</script>
</body>

</html>
