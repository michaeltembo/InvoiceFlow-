
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Purchase Invoices • InvoiceFlow</title>

<link rel="stylesheet" href="dashboard.css">
<script src="https://unpkg.com/lucide@latest"></script>

<style>

/* 🌍 GLOBAL */
body{
  font-family: Inter, system-ui;
  background:#f4f6f9;
  margin:0;
  padding:20px;
}

/* 💎 HEADER */
.elite-header{
  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:18px 22px;
  margin-bottom:30px;

  background:linear-gradient(135deg,#ffffff,#f9fafb);
  border-radius:14px;

  box-shadow:0 6px 20px rgba(0,0,0,0.06);
}

.header-left h1{
  margin:0;
  font-size:22px;
  font-weight:700;
}

.subtitle{
  font-size:13px;
  color:#6b7280;
}

.create-btn{
  background:linear-gradient(135deg,#ef4444,#f97316);
  color:white;
  border:none;
  padding:10px 16px;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
}

/* 📊 SUMMARY */
.summary{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  margin-bottom:30px;
}

.card{
  background:white;
  padding:22px;
  border-radius:12px;
  box-shadow:0 4px 14px rgba(0,0,0,0.06);
}

.card span{
  font-size:13px;
  color:#6b7280;
}

.card h3{
  font-size:26px;
  margin-top:8px;
}

/* 🔴 Expense colors */
.total-card{ border-left:4px solid #ef4444; }
.paid-card{ border-left:4px solid #22c55e; }
.pending-card{ border-left:4px solid #f59e0b; }
.overdue-card{ border-left:4px solid #dc2626; }

/* 📋 TABLE */
.table-wrapper{
  background:white;
  border-radius:12px;
  box-shadow:0 4px 14px rgba(0,0,0,0.06);
  overflow:hidden;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:14px;
  border-bottom:1px solid #eee;
}

th{
  background:#fafafa;
  font-size:13px;
  color:#6b7280;
}

/* 👤 CLIENT CELL */
.client-cell{
  display:flex;
  align-items:center;
  gap:10px;
}

.client-avatar{
  width:34px;
  height:34px;
  border-radius:50%;
  object-fit:cover;
}

/* 📄 INVOICE */
.invoice-cell{
  display:flex;
  gap:10px;
  align-items:center;
}

.invoice-icon{
  background:#fee2e2;
  padding:6px;
  border-radius:6px;
}

/* 📊 STATUS */
.status{
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
}

.status.paid{
  background:#dcfce7;
  color:#15803d;
}

.status.pending{
  background:#fef3c7;
  color:#92400e;
}

.status.overdue{
  background:#fee2e2;
  color:#b91c1c;
}

/* 💰 TOTAL */
.total-cell{
  display:flex;
  align-items:center;
  gap:6px;
}

.invoice-badge{
  background:#fee2e2;
  padding:5px;
  border-radius:6px;
}

/* 💎 PAID META */
.paid-meta{
  display:flex;
  align-items:center;
  gap:6px;
  margin-top:4px;
}

.paid-avatar{
  width:20px;
  height:20px;
  border-radius:50%;
}

/* 🌙 DARK MODE */
body.dark{
  background:#0f172a;
  color:#e5e7eb;
}

body.dark .card,
body.dark .table-wrapper{
  background:#1e293b;
}

body.dark th{
  background:#020617;
  color:#94a3b8;
}


.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.4);
  display:flex;
  align-items:center;
  justify-content:center;
}

.modal-box{
  background:white;
  padding:25px;
  border-radius:12px;
  width:300px;
}

.hidden{
  display:none;
}

.pay-btn{
  background:#16a34a;
  color:white;
  border:none;
  padding:6px 12px;
  border-radius:6px;
  cursor:pointer;
}

.status.partial{
  background:#e0f2fe;
  color:#0369a1;
}


/* 📱 MOBILE TABLE FIX */
.table-scroll{
  width:100%;
  overflow-x:auto;
}

.table-scroll::-webkit-scrollbar{
  height:6px;
}

.table-scroll::-webkit-scrollbar-thumb{
  background:#ddd;
  border-radius:10px;
}

/* Prevent table from shrinking */
table{
  min-width:700px;
}


.client-avatar.placeholder{
  width:34px;
  height:34px;
  border-radius:50%;
  background:#ef4444;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:600;
}



.action-btn{
  border:none;
  padding:6px 8px;
  border-radius:6px;
  cursor:pointer;
  font-size:14px;
}

.pay-btn{
  background:#16a34a;
  color:white;
}

.view-btn{
  background:#2563eb;
  color:white;
}

.delete-btn{
  background:#dc2626;
  color:white;
}

.paid-badge{
  color:#16a34a;
  font-weight:700;
  font-size:14px;
}


function openImage(src){
  let modal = document.getElementById("imagePreviewModal");

  // create modal if not exists
  if (!modal){
    modal = document.createElement("div");
    modal.id = "imagePreviewModal";

    modal.innerHTML = `
      <div class="image-overlay" onclick="closeImage()">
        <img id="previewImage" src="" />
        <span class="close-btn" onclick="closeImage()">✕</span>
      </div>
    `;

    document.body.appendChild(modal);
  }

  document.getElementById("previewImage").src = src;
  modal.style.display = "flex";
}

function closeImage(){
  const modal = document.getElementById("imagePreviewModal");
  if (modal) modal.style.display = "none";
}

</style>

</head>

<body>

<header class="elite-header">
  <div class="header-left">
    <h1>Purchase Invoices</h1>
    <span class="subtitle">Track expenses & supplier payments</span>
  </div>

  <button class="create-btn" onclick="createPurchaseInvoice()">
    + New Purchase
  </button>
</header>

<!-- 📊 SUMMARY -->
<section class="summary">
  <div class="card total-card">
    <span>Total Expenses</span>
    <h3 id="totalExpenses">0</h3>
  </div>

  <div class="card paid-card">
    <span>Paid</span>
    <h3 id="paidTotal">0</h3>
  </div>

  <div class="card pending-card">
    <span>Pending</span>
    <h3 id="pendingTotal">0</h3>
  </div>

  <div class="card overdue-card">
    <span>Overdue</span>
    <h3 id="overdueTotal">0</h3>
  </div>
</section>

<!-- 📋 TABLE -->

<div class="table-wrapper">

  <!-- 🔥 SCROLL WRAPPER -->
  <div class="table-scroll">

    <table>

      <thead>
        <tr>
          <th>Invoice</th>
          <th>Supplier</th>
          <th>Date</th>
          <th>Status</th>
          <th>Total</th>
          <th>Balance</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody id="purchaseTable">
        <tr><td colspan="7">Loading...</td></tr>
      </tbody>

    </table>

  </div>

  <!-- 💳 PAYMENT MODAL -->
  <div id="payModal" class="modal hidden">

    <div class="modal-box">
      <h3>Pay Supplier</h3>

      <input type="number" id="payAmount" placeholder="Amount">

      <select id="payMethod">
        <option value="cash">Cash</option>
        <option value="bank">Bank</option>
        <option value="mobile">Mobile Money</option>
      </select>

      <br><br>

      <button onclick="submitPayment()">Confirm Payment</button>
      <button onclick="closePayModal()">Cancel</button>

    </div>

  </div>

</div>

<script>

/* =============================
   INIT
============================= */

document.addEventListener("DOMContentLoaded", () => {
  console.log("🚀 Purchase Invoice Page Loaded");
  loadPurchaseInvoices();
});


/* =============================
   LOAD INVOICES
============================= */

async function loadPurchaseInvoices(){
const token = localStorage.getItem("token");

try {
const res = await fetch("/purchase-invoices", {
headers: {
Authorization: "Bearer " + token
}
});

console.log("STATUS:", res.status);  

if (!res.ok) {  
  throw new Error("Request failed: " + res.status);  
}  

const data = await res.json();  

console.log("API DATA:", data);  

const invoices = Array.isArray(data) ? data : data.data || [];  

renderPurchaseInvoices(invoices);

} catch (err) {
console.error("❌ LOAD ERROR:", err);

document.getElementById("purchaseTable").innerHTML =  
  "<tr><td colspan='7'>❌ Failed to load invoices</td></tr>";

}
}


/* =============================
   RENDER TABLE
============================= */

function renderPurchaseInvoices(invoices){

  const table = document.getElementById("purchaseTable");
  table.innerHTML = "";

  let paid = 0;
  let pending = 0;
  let overdue = 0;

  if (!invoices || !invoices.length){
    table.innerHTML = "<tr><td colspan='7'>No purchase invoices</td></tr>";
    updateSummary(0,0,0);
    return;
  }

  invoices.forEach(inv => {

    const amount = Number(inv.total || 0);
    const balance = Number(inv.balance || 0);
    const status = inv.status || "pending";

    // ✅ IMAGE FIX

const imageUrl = inv.attachment
  ? inv.attachment
  : `https://ui-avatars.com/api/?name=${encodeURIComponent(inv.supplier_name || "Supplier")}&background=ef4444&color=fff`;

    const row = document.createElement("tr");

    row.innerHTML = `
      <td>
        <div class="invoice-cell">
          <div class="invoice-icon">
            📄
          </div>
          <span>PINV-${inv.id}</span>
        </div>
      </td>


<td>
  <div class="client-cell">

<img
  src="${imageUrl}"
  class="client-avatar"
  onclick="openImage('${imageUrl}')"
      onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(inv.supplier_name || "Supplier")}&background=ef4444&color=fff'"
    />
    <span>${inv.supplier_name || "-"}</span>
  </div>
</td>


<td>${formatDate(inv.issue_date)}</td>

<td>
  <span class="status ${status}">
    ${status}
  </span>
</td>

<td>${formatMoney(amount)}</td>

<td><strong>${formatMoney(balance)}</strong></td>

<td>
  <div style="display:flex; gap:6px; align-items:center;">

    ${
      status !== "paid"
        ? `<button 
            onclick="openPayModal(${inv.id}, ${balance})" 
            class="pay-btn action-btn"
            title="Pay"
          >
            💳
          </button>`
        : `<span class="paid-badge">✔</span>`
    }

    <button 
      onclick="viewInvoice(${inv.id})" 
      class="view-btn action-btn"
      title="View"
    >
      👁
    </button>

    <button 
      onclick="deleteInvoice(${inv.id})" 
      class="delete-btn action-btn"
      title="Delete"
    >
      🗑
    </button>

  </div>
</td>

    `;

    table.appendChild(row);

    // ✅ SUMMARY
    if (status === "paid") {
      paid += amount;
    } else if (status === "overdue") {
      overdue += amount;
    } else {
      pending += amount;
    }

  });

  updateSummary(paid, pending, overdue);
}

/* =============================
   SUMMARY CARDS
============================= */

function updateSummary(paid, pending, overdue){
  const total = paid + pending + overdue;

  document.getElementById("totalExpenses").innerText = formatMoney(total);
  document.getElementById("paidTotal").innerText = formatMoney(paid);
  document.getElementById("pendingTotal").innerText = formatMoney(pending);
  document.getElementById("overdueTotal").innerText = formatMoney(overdue);
}


/* =============================
   HELPERS
============================= */

function formatMoney(amount){
  return new Intl.NumberFormat("en-US", {
    style: "currency",
    currency: "ZMW"
  }).format(amount || 0);
}

function formatDate(date){
  return date ? new Date(date).toLocaleDateString() : "-";
}


/* =============================
   NAVIGATION
============================= */

function createPurchaseInvoice(){
  window.location = "create-purchase-invoice.html";
}


/* =============================
   PAYMENT MODAL
============================= */

let currentInvoiceId = null;

function openPayModal(id, balance){
  currentInvoiceId = id;
  document.getElementById("payAmount").value = balance || 0;
  document.getElementById("payModal").classList.remove("hidden");
}

function closePayModal(){
  document.getElementById("payModal").classList.add("hidden");
}


/* =============================
   SUBMIT PAYMENT
============================= */

async function submitPayment(){
  const amount = Number(document.getElementById("payAmount").value);
  const method = document.getElementById("payMethod").value;

  if (!amount || amount <= 0){
    alert("Enter valid amount");
    return;
  }

  try {
    const res = await fetch(`/purchase-invoices/${currentInvoiceId}/pay`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: "Bearer " + localStorage.getItem("token")
      },
      body: JSON.stringify({ amount, method })
    });

    if (!res.ok){
      throw new Error("Payment failed");
    }

    alert("✅ Payment recorded");

    closePayModal();
    loadPurchaseInvoices();

  } catch (err){
    console.error(err);
    alert("❌ Payment failed");
  }
}


function openImage(src){
  let modal = document.getElementById("imagePreviewModal");

  // create modal if not exists
  if (!modal){
    modal = document.createElement("div");
    modal.id = "imagePreviewModal";

    modal.innerHTML = `
      <div class="image-overlay" onclick="closeImage()">
        <img id="previewImage" src="" />
        <span class="close-btn" onclick="closeImage()">✕</span>
      </div>
    `;

    document.body.appendChild(modal);
  }

  document.getElementById("previewImage").src = src;
  modal.style.display = "flex";
}

function closeImage(){
  const modal = document.getElementById("imagePreviewModal");
  if (modal) modal.style.display = "none";
}

function viewInvoice(id){
  window.location = `view-purchase-invoice.html?id=${id}`;
}

</script>
</body>
</html>
