
<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invoice • InvoiceFlow</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>

*{
box-sizing:border-box;
}

body{
font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#f4f6f9;
margin:0;
padding:40px;
color:#111827;
}

/* MAIN CARD */

.container{
max-width:1000px;
margin:auto;
background:white;
padding:25px;
border-radius:14px;
box-shadow:
0 20px 40px rgba(0,0,0,0.05),
0 5px 15px rgba(0,0,0,0.04);
}

/* HEADER */

.invoice-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:35px;
}

.brand{
display:flex;
align-items:center;
gap:10px;
}

.logo{
width:40px;
height:40px;
border-radius:8px;
background:#111827;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-weight:700;
}

.company-name{
font-size:18px;
font-weight:700;
}

.invoice-title{
text-align:right;
}

.invoice-title h1{
margin:0;
font-size:26px;
}

.invoice-number{
color:#6b7280;
font-size:14px;
}

/* FROM / BILL TO */

.address-grid{
display:flex;
justify-content:space-between;
margin-bottom:35px;
gap:40px;
}

.address-block h4{
font-size:13px;
text-transform:uppercase;
color:#6b7280;
margin-bottom:8px;
}

.address-block div{
font-weight:500;
margin-bottom:4px;
}

/* INFO GRID */

.info-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.info-label{
font-size:12px;
color:#6b7280;
}

.info-value{
font-weight:600;
margin-top:2px;
}

/* STATUS BADGE */

.status-badge{
display:inline-block;
padding:4px 10px;
border-radius:6px;
font-size:12px;
font-weight:600;
}

.paid{
background:#dcfce7;
color:#15803d;
}

.pending{
background:#fef3c7;
color:#b45309;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th{
text-align:left;
font-size:13px;
color:#6b7280;
border-bottom:1px solid #e5e7eb;
padding:12px 10px;
}

td{
padding:12px 10px;
border-bottom:1px solid #f3f4f6;
}

/* TOTALS */

.totals{
max-width:320px;
margin-left:auto;
margin-top:25px;
}

.total-row{
display:flex;
justify-content:space-between;
margin-bottom:8px;
font-size:14px;
}

.total-grand{
font-size:18px;
font-weight:700;
}

/* QR */

.qr-section{
margin-top:40px;
text-align:center;
}

.qr-section p{
font-size:13px;
color:#6b7280;
margin-bottom:8px;
}

/* ACTIONS */

.actions{
margin-top:35px;
display:flex;
gap:10px;
}

button{
padding:10px 16px;
border:none;
border-radius:8px;
font-weight:600;
cursor:pointer;
}

.print{
background:#111827;
color:white;
}

.pdf{
background:#2563eb;
color:white;
}

.back{
background:#e5e7eb;
}

/* PRINT */

@media print{

.actions{
display:none;
}

body{
padding:0;
background:white;
}

.container{
box-shadow:none;
}

}

.payment-section{
display:flex;
justify-content:space-between;
margin-top:40px;
gap:40px;
}

.payment-details{
flex:1;
}

.payment-details h4{
font-size:13px;
text-transform:uppercase;
color:#6b7280;
margin-bottom:10px;
}

.payment-row{
display:flex;
justify-content:space-between;
font-size:14px;
margin-bottom:6px;
}

.signature{
flex:1;
text-align:right;
}

.signature-line{
width:220px;
border-bottom:2px solid #111827;
margin-left:auto;
margin-top:20px;
}

.signature-label{
font-size:12px;
color:#6b7280;
margin-top:6px;
}

.due-note{
margin-top:25px;
font-size:13px;
color:#6b7280;
}

.invoice-footer{
margin-top:40px;
text-align:center;
font-size:13px;
color:#6b7280;
border-top:1px solid #e5e7eb;
padding-top:12px;
}


.totals,
.payment-section,
.qr-section{
page-break-inside: avoid;
}


@media print{

.container{
padding:20px;
}

body{
padding:0;
}

}

/* PDF MODE FIX */

.pdf-mode{
background:white !important;
padding:0 !important;
}

.pdf-mode body{
padding:0 !important;
margin:0 !important;
background:white !important;
}

.pdf-mode .container{
width:794px !important; /* A4 width */
max-width:794px !important;
margin:0 auto !important;
padding:25px !important;
box-shadow:none !important;
border-radius:0 !important;
}



/* MOBILE RESPONSIVE */

@media (max-width:768px){

body{
padding:15px;
}

/* container full width */

.container{
max-width:100%;
padding:18px;
}

/* header stack */

.invoice-header{
flex-direction:column;
align-items:flex-start;
gap:10px;
}

.invoice-title{
text-align:left;
}

/* addresses stack */

.address-grid{
flex-direction:column;
gap:20px;
}

/* info grid becomes 2 columns */

.info-grid{
grid-template-columns:1fr 1fr;
gap:15px;
}

/* payment section stack */

.payment-section{
flex-direction:column;
gap:25px;
}

.signature{
text-align:left;
}

.signature-line{
margin-left:0;
}

/* table scroll */

table{
display:block;
overflow-x:auto;
white-space:nowrap;
}

/* totals full width */

.totals{
max-width:100%;
}

/* buttons stack */

.actions{
flex-direction:column;
}

button{
width:100%;
}

}


</style>

</head>

<body>

<div class="container" id="invoiceArea">

<!-- HEADER -->

<div class="invoice-header">

<div class="brand">
<div class="logo">IF</div>
<div class="company-name">InvoiceFlow</div>
</div>

<div class="invoice-title">
<h1>Invoice</h1>
<div class="invoice-number" id="invoiceNumber"></div>
</div>

</div>

<!-- ADDRESSES -->

<div class="address-grid">

<div class="address-block">

<h4>From</h4>

<div id="companyName"></div>
<div id="companyEmail"></div>
<div id="companyPhone"></div>

</div>

<div class="address-block">

<h4>Bill To</h4>

<div id="client"></div>
<div id="clientEmail"></div>
<div id="clientPhone"></div>

</div>

</div>

<!-- INFO -->

<div class="info-grid">

<div>
<div class="info-label">Status</div>
<div id="status" class="info-value"></div>
</div>

<div>
<div class="info-label">Invoice Date</div>
<div id="date" class="info-value"></div>
</div>

<div>
<div class="info-label">Due Date</div>
<div id="dueDate" class="info-value"></div>
</div>

<div>
<div class="info-label">Client</div>
<div id="clientName" class="info-value"></div>
</div>

</div>

<!-- ITEMS -->

<table>

<thead>

<tr>
<th>Description</th>
<th>Qty</th>
<th>Price</th>
<th>Total</th>
</tr>

</thead>

<tbody id="items"></tbody>

</table>

<!-- TOTALS -->

<div class="totals">

<div class="total-row">
<span>Subtotal</span>
<span id="subtotal"></span>
</div>

<div class="total-row">
<span>Tax</span>
<span id="tax"></span>
</div>

<div class="total-row total-grand">
<span>Total</span>
<span id="total"></span>
</div>

</div>

<div class="payment-section">

<div class="payment-details">

<h4>Payment Details</h4>

<div class="payment-row">
<span>Bank</span>
<span id="bankName"></span>
</div>

<div class="payment-row">
<span>Account Name</span>
<span id="accountName"></span>
</div>

<div class="payment-row">
<span>Account Number</span>
<span id="accountNumber"></span>
</div>

<div class="payment-row">
<span>SWIFT</span>
<span id="swift"></span>
</div>

</div>

<div class="signature">

<img id="signatureImage" style="max-width:200px;display:none">

<div class="signature-line"></div>
<div id="signatoryName" class="signature-label"></div>

</div>

</div>

<!-- DUE DATE NOTE -->

<div id="dueNote" class="due-note"></div>

<!-- FOOTER -->

<div id="invoiceFooter" class="invoice-footer"></div>


<!-- QR -->

<div class="qr-section">

<p>Scan to verify this invoice</p>

<canvas id="qrcode"></canvas>

</div>

</div>

<!-- ACTIONS -->

<div class="actions">

<button class="print" onclick="window.print()">Print</button>

<button class="pdf" onclick="downloadPDF()">Download PDF</button>

<button class="pdf" onclick="sendInvoiceEmail()">
Email Invoice
</button>

<button class="back" onclick="window.location='invoices.html'">Back</button>

</div>

<script>

/* Currency */

const currency = localStorage.getItem("currency") || "ZMW";

function formatMoney(amount){
  return new Intl.NumberFormat("en-ZM",{
    style:"currency",
    currency:currency
  }).format(Number(amount || 0));
}

/* GET INVOICE ID */

const params = new URLSearchParams(window.location.search)
const id = params.get("id")

if(!id){
alert("Invoice ID missing in URL")
throw new Error("No invoice id")
}

/* LOAD INVOICE */

async function loadInvoice(){

try{



console.log("Invoice ID:", id)

const token = localStorage.getItem("token")

if(!token){
alert("You are not logged in")
window.location = "login.html"
return
}


const res = await fetch(`/invoices/${id}`,{
headers:{
"Authorization":"Bearer "+token
}
})

console.log("Status:",res.status)

if(!res.ok){
throw new Error("Server error: "+res.status)
}

let data = {};

try{
data = await res.json();
}catch(e){
throw new Error("Invalid JSON from /invoices API");
}


console.log("API Data:",data)

const invoice = data.invoice || {}
const items = data.items || []

/* COMPANY (temporary placeholder) */


/* CLIENT */

document.getElementById("client").innerText =
invoice.client_name || "Client"

document.getElementById("clientName").innerText =
invoice.client_name || ""

document.getElementById("clientEmail").innerText =
invoice.client_email || invoice.email || "";

console.log("INVOICE:", invoice);

console.log("CLIENT EMAIL FROM API:", invoice.client_email, invoice.email);

/* INVOICE INFO */

document.getElementById("invoiceNumber").innerText =
"INV-" + (invoice.id || "")

document.getElementById("status").innerHTML =
invoice.status === "paid"
? '<span class="status-badge paid">Paid</span>'
: '<span class="status-badge pending">Pending</span>'

document.getElementById("date").innerText =
invoice.created_at
? new Date(invoice.created_at).toLocaleDateString()
: ""

document.getElementById("dueDate").innerText =
invoice.due_date
? new Date(invoice.due_date).toLocaleDateString()
: ""

/* ITEMS */

const table = document.getElementById("items")
table.innerHTML=""

let subtotal = 0

items.forEach(item => {

const qty = Number(item.quantity) || 0

const price = Number(item.unit_price ?? item.price ?? 0)

const total = qty * price

subtotal += total

table.innerHTML += `
<tr>
<td>${item.description || ""}</td>
<td>${qty}</td>
<td>${formatMoney(price)}</td>
<td>${formatMoney(total)}</td>
</tr>
`

})

/* TOTALS */

const taxRate = Number(invoice.tax_rate || 0)
const tax = subtotal*(taxRate/100)
const grandTotal = subtotal+tax

document.getElementById("subtotal").innerText =
formatMoney(subtotal)

document.getElementById("tax").innerText =
formatMoney(tax)

document.getElementById("total").innerText =
formatMoney(grandTotal)

/* LOAD COMPANY SETTINGS */

let company = {};

const resCompany = await fetch("/company-settings",{
headers:{
Authorization:"Bearer " + token
}
});

if(resCompany.ok){

const result = await resCompany.json();
company = result.company || result.data || result || {};

/* ✅ NOW USE company AFTER ASSIGNING */

document.getElementById("companyName").innerText =
company.company_name || "InvoiceFlow";

document.getElementById("companyEmail").innerText =
company.email || "";

document.getElementById("companyPhone").innerText =
company.phone || "";

/* PAYMENT DETAILS */

document.getElementById("bankName").innerText =
company.bank_name || "";

document.getElementById("accountName").innerText =
company.account_name || "";

document.getElementById("accountNumber").innerText =
company.account_number || "";

document.getElementById("swift").innerText =
company.swift || company.swift_code || "ZANACZLX";

}

/* SIGNATURE (SAFE) */

if(company && company.signature_path){

const img = document.getElementById("signatureImage")

img.src = company.signature_path
img.style.display = "block"

}

document.getElementById("signatoryName").innerText =
company?.signatory || "Authorized Signature"

/* FOOTER */

document.getElementById("invoiceFooter").innerText =
company?.invoice_footer || "Thank you for your business"




const due = invoice.due_date ? new Date(invoice.due_date) : null;
const today = new Date();

let dueMessage = "";

if(due){
  const diffDays = Math.ceil((due - today) / (1000 * 60 * 60 * 24));

  if(diffDays < 0){
    dueMessage = "⚠️ Payment is overdue";
  } else if(diffDays === 0){
    dueMessage = "⚠️ Payment due today";
  } else if(diffDays <= 3){
    dueMessage = `⏳ Payment due in ${diffDays} day(s)`;
  } else {
    dueMessage = `Due in ${diffDays} days`;
  }
}

document.getElementById("dueNote").innerText = dueMessage;



/* QR */

try{
QRCode.toCanvas(
document.getElementById("qrcode"),
window.location.href,
{width:120}
)
}catch(e){
console.log("QR error:", e);
}

}catch(err){

console.error("FULL ERROR:", err);
alert("Error loading invoice: " + err.message);

}


}



function downloadPDF(){

const element = document.getElementById("invoiceArea")

/* switch to PDF layout */
document.documentElement.classList.add("pdf-mode")

setTimeout(()=>{

const opt = {
margin:0,
filename:"invoice-"+id+".pdf",

image:{
type:"jpeg",
quality:1
},

html2canvas:{
scale:2,
scrollX:0,
scrollY:0,
windowWidth:794
},

jsPDF:{
unit:"pt",
format:"a4",
orientation:"portrait"
}
}

html2pdf()
.set(opt)
.from(element)
.save()
.then(()=>{
document.documentElement.classList.remove("pdf-mode")
})

},200)

}


async function loadCompany(){

const token = localStorage.getItem("token")

const res = await fetch("/company-settings",{
headers:{
Authorization:"Bearer "+token
}
})

const company = await res.json()

document.getElementById("companyName").innerText =
company.company_name || ""

document.getElementById("companyEmail").innerText =
company.email || ""

document.getElementById("companyPhone").innerText =
company.phone || ""

document.getElementById("bankName").innerText =
company.bank_name || ""

document.getElementById("accountName").innerText =
company.account_name || ""

document.getElementById("accountNumber").innerText =
company.account_number || ""

document.getElementById("invoiceFooter").innerText =
company.invoice_footer || ""

}



async function sendInvoiceEmail(){

const token = localStorage.getItem("token");

const emailElement = document.getElementById("clientEmail");

console.log("ELEMENT:", emailElement);

if(!emailElement){
alert("clientEmail element not found");
return;
}

const raw = emailElement.innerText || "";
console.log("INNER TEXT RAW:", raw);

const email = raw.trim();

console.log("FINAL EMAIL:", email);

if(!email){
alert("Client email missing");
return;
}

try{

const res = await fetch("/send-invoice-email",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer " + token
},
body: JSON.stringify({
email: email,
invoiceId: id
})
});

if(!res.ok){
const err = await res.json();
throw new Error(err.error || "Failed to send");
}

alert("Invoice sent successfully");

}catch(err){
console.error(err);
alert("Error sending email: " + err.message);
}

}


/* RUN */

loadInvoice()



</script>

</body>
</html>
