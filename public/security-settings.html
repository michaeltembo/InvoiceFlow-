<!DOCTYPE html>
<html>
<head>
<title>Security</title>
<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
}

.page{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:40px;
width:380px;
border-radius:14px;
box-shadow:0 20px 50px rgba(0,0,0,0.15);
text-align:center;
}

h2{
margin-bottom:25px;
color:#111827;
font-weight:600;
}

button{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:8px;
font-size:14px;
font-weight:600;
cursor:pointer;
transition:all 0.25s ease;
}

/* Change password button */

button:first-of-type{
background:#6366f1;
color:white;
}

button:first-of-type:hover{
background:#4f46e5;
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(79,70,229,0.35);
}

/* 2FA button */

button:last-of-type{
background:#10b981;
color:white;
}

button:last-of-type:hover{
background:#059669;
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(16,185,129,0.35);
}




/* =============================
   DARK MODE - SECURITY
============================= */

body.dark {
  background: #0f172a;
  color: #e5e7eb;
}

/* CARD */
body.dark .card {
  background: #1e293b;
  border: 1px solid #334155;
  padding: 20px;
  border-radius: 12px;
}

/* TITLE */
body.dark .card h2 {
  color: #f9fafb;
}

/* BUTTONS */
body.dark .card button {
  width: 100%;
  margin-bottom: 12px;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #334155;
  background: #0f172a;
  color: #e5e7eb;
  text-align: left;
}

/* HOVER */
body.dark .card button:hover {
  background: #1e293b;
}

/* PRIMARY ACTION (2FA) */
body.dark .card button:last-child {
  background: #4f46e5;
  color: #ffffff;
  border: none;
}



</style>


</head>

<body>

<div class="page">

<div class="card">

<h2>Security</h2>

<button onclick="changePassword()">Change Password</button>

<button onclick="enable2FA()">Enable Two-Factor Authentication</button>

</div>

</div>

<script>

function changePassword(){
  window.location.href = "/change-password.html";
}

function enable2FA(){
  window.location.href = "/two-factor.html";
}



// =============================
// LOAD SAVED THEME
// =============================
document.addEventListener("DOMContentLoaded", () => {
const savedTheme = localStorage.getItem("theme");

if (savedTheme === "dark") {
document.body.classList.add("dark");
}

// SYSTEM DARK MODE (FIXED)
const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;

if (!savedTheme && prefersDark) {
document.body.classList.add("dark");
}
});


// =============================
// TOGGLE THEME
// =============================
function toggleTheme() {
document.body.classList.toggle("dark");

if (document.body.classList.contains("dark")) {
localStorage.setItem("theme", "dark");
} else {
localStorage.setItem("theme", "light");
}
}


</script>
</body>
</html>
